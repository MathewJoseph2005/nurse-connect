services:
  - type: web
    name: nurse-connect
    env: node
    plan: free
    rootDir: nurse-connect
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
        placeholder: "Your MongoDB Connection String (SRV)"
      - key: MONGODB_URI_DIRECT
        sync: false
        placeholder: "Your MongoDB Connection String (Direct/Non-SRV)"
      - key: MONGODB_PREFER_DIRECT
        value: "true"
      - key: GROQ_API_KEY
        sync: false
        placeholder: "Your Groq API Key"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
        placeholder: "Your App URL (e.g., https://nurse-connect.onrender.com)"
      - key: VITE_API_BASE_URL
        value: "/api"
